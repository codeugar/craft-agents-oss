name: Validate Daily Note Read

on:
  workflow_dispatch:

jobs:
  read-daily-note:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Read today's daily note
        timeout-minutes: 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          bun run apps/cli/src/index.ts run \
            --workspace-dir .github/agents \
            --source craft-public \
            --output-format stream-json \
            "Read today's daily note from the Craft source and print its contents. Do not modify anything."
